<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚡ Void Engine</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="starfield"></div>
<div id="eraFlash"></div>

<div class="app" id="app">

  <!-- HUD -->
  <header class="hud">
    <div class="hud-cell">
      <span class="hud-label">⚡ Energía</span>
      <span class="hud-value" id="energy">0</span>
    </div>
    <div class="hud-cell era">
      <span class="hud-label">🌌 Era</span>
      <span class="hud-value" id="eraText">—</span>
    </div>
    <div class="hud-cell">
      <span class="hud-label">⚙ EPS</span>
      <span class="hud-value" id="eps">0/s</span>
    </div>
  </header>

  <!-- TABS -->
  <nav class="tabs">
    <button class="tab-btn active" data-tab="main">⚡ Generar</button>
    <button class="tab-btn" data-tab="shop">Tienda</button>
    <button class="tab-btn" data-tab="tree">Árbol</button>
    <button class="tab-btn" data-tab="prestige">Prestigio</button>
  </nav>

  <!-- CONTENT -->
  <main class="content">

    <!-- MAIN TAB: orbe + era bar -->
    <section id="mainPane" class="tab-pane active">
      <div class="main-tab-layout">

        <div class="era-bar-wrap">
          <div class="era-bar-label" id="eraBarLabel">Progreso de Era</div>
          <div class="era-bar"><div class="era-bar-fill" id="eraBarFill"></div></div>
        </div>

        <div class="orb-section">
          <div class="core-wrapper">
            <div class="core-ring core-ring-1"></div>
            <div class="core-ring core-ring-2"></div>
            <div class="core-ring core-ring-3"></div>
            <button id="clickBtn" class="main-btn">⚡<br>GENERAR</button>
          </div>
          <span class="click-hint">toca para generar energía</span>
        </div>

        <div class="quick-stats">
          <div class="qs-item">
            <span class="qs-label">Por click</span>
            <span class="qs-val" id="clickPower">1</span>
          </div>
          <div class="qs-sep">·</div>
          <div class="qs-item">
            <span class="qs-label">Por segundo</span>
            <span class="qs-val" id="epsStat">0</span>
          </div>
          <div class="qs-sep">·</div>
          <div class="qs-item">
            <span class="qs-label">Multiplicador</span>
            <span class="qs-val" id="multStat">1.00x</span>
          </div>
        </div>

      </div>
    </section>

    <!-- SHOP TAB -->
    <section id="shopPane" class="tab-pane">
      <div class="section-title">Mejoras disponibles</div>
      <div class="shop-grid" id="shopGrid"></div>
    </section>

    <!-- TREE TAB — full pane, draggable -->
    <section id="treePane" class="tab-pane tree-tab-pane">
      <div class="tree-header">
        <span class="tree-header-title">✦ Árbol de Prestigio</span>
        <span class="tree-header-hint">arrastra para explorar</span>
      </div>
      <div id="treeViewport" class="tree-viewport">
        <div id="treeCanvas" class="tree-canvas"></div>
      </div>
    </section>

    <!-- PRESTIGE TAB -->
    <section id="prestigePane" class="tab-pane">
      <div class="prestige-panel">
        <div class="prestige-header">
          <div class="prestige-stat">
            <span class="val" id="prestigePoints">0</span>
            <span class="lbl">💎 Fragmentos</span>
          </div>
          <div class="prestige-stat">
            <span class="val" id="prestigeBonus">1.00x</span>
            <span class="lbl">🚀 Bonus</span>
          </div>
          <div class="prestige-stat">
            <span class="val" id="prestigePreview" style="color:#aaa">0</span>
            <span class="lbl">Ganancia</span>
          </div>
        </div>

        <div class="prestige-gain-preview">
          Reiniciar otorgará <strong id="pGainText">0</strong> fragmentos 💎
        </div>

        <button class="prestige-btn" id="prestigeBtn">⟳ Reiniciar & Ascender</button>

        <div class="p-shop-title">💎 Tienda de Fragmentos</div>
        <div class="p-shop-grid" id="prestigeShop"></div>
      </div>
    </section>

  </main>
</div>

<div id="toast">—</div>

<script>
(function() {
  const sf = document.getElementById('starfield');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    const op   = (Math.random() * 0.6 + 0.1).toFixed(2);
    s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:${Math.random()>0.8?'#c0e8ff':'#ffffff'};--op:${op};--dur:${(Math.random()*4+2).toFixed(1)}s;animation-delay:${(Math.random()*4).toFixed(1)}s;`;
    sf.appendChild(s);
  }
})();
</script>

<script type="module">
  import { checkAuth } from "/src/auth.js";
  import { initGame } from "/src/game.js";

  checkAuth();
  initGame();
</script>

</body>
</html>
