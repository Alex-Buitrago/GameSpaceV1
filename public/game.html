<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="card">
        <h1>⚡ Energía: <span id="energy">0</span></h1>
        <button id="clickBtn">Generar</button>
      </div>

      <h3>⚙ Producción: <span id="eps">0</span>/s</h3>

      <div class="card">
        <h2>Prestigio</h2>
        <p>💎 Fragmentos: <span id="prestigePoints">0</span></p>
        <p>🚀 Bonus: <span id="prestigeBonus">1x</span></p>
        <button id="prestigeBtn">Reiniciar progreso</button>
      </div>

      <p>Ganancia potencial: <span id="prestigePreview">0</span> 💎</p>
      
      <div class="card">
        <h2>Tienda</h2>
        <div id="shop"></div>
      </div>

      <h2 id="eraText"></h2>

    <script type="module">
        import { auth } from "/src/firebase.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { initGame } from "/src/game.js";

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "/login.html";
            } else {
                initGame();
            }
        });
    </script>

</body>

</html>
