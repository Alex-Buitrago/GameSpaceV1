<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>⚡ Void Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="app">

  <!-- ── HUD ── -->
  <header class="hud">
    <div class="hud-cell">
      <span class="hud-icon">⚡</span>
      <span class="hud-val" id="energy">0</span>
      <span class="hud-lbl">Energía</span>
    </div>
    <div class="hud-cell hud-era">
      <span class="hud-icon">🌌</span>
      <span class="hud-val" id="eraText">—</span>
      <span class="hud-lbl">Era</span>
    </div>
    <div class="hud-cell">
      <span class="hud-icon">⚙</span>
      <span class="hud-val" id="eps">0/s</span>
      <span class="hud-lbl">Por segundo</span>
    </div>
  </header>

  <!-- ── TABS ── -->
  <nav class="tabs">
    <button class="tab-btn active" data-tab="main">⚡<span>Generar</span></button>
    <button class="tab-btn"        data-tab="shop">🛒<span>Tienda</span></button>
    <button class="tab-btn"        data-tab="tree">🌳<span>Árbol</span></button>
    <button class="tab-btn"        data-tab="prestige">💎<span>Prestigio</span></button>
  </nav>

  <!-- ── PANELS ── -->
  <main class="panels">

    <!-- GENERAR -->
    <section id="mainPane" class="panel active">
      <div class="main-layout">

        <div class="era-progress">
          <div class="era-progress-label" id="eraBarLabel">Progreso de Era</div>
          <div class="era-progress-track">
            <div class="era-progress-fill" id="eraBarFill" style="width:0%"></div>
          </div>
        </div>

        <div class="orb-wrap">
          <div class="orb-rings">
            <div class="ring r1"></div>
            <div class="ring r2"></div>
            <div class="ring r3"></div>
          </div>
          <button id="clickBtn" class="orb" aria-label="Generar energía">
            <span class="orb-glyph">⚡</span>
            <span class="orb-label">GENERAR</span>
          </button>
        </div>

        <p class="orb-hint">toca para generar energía</p>

        <div class="stats-row">
          <div class="stat-box">
            <span class="stat-val" id="clickPower">1</span>
            <span class="stat-lbl">Por click</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-box">
            <span class="stat-val" id="epsStat">0</span>
            <span class="stat-lbl">Por segundo</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-box">
            <span class="stat-val" id="multStat">1.00x</span>
            <span class="stat-lbl">Multiplicador</span>
          </div>
        </div>

      </div>
    </section>

    <!-- TIENDA -->
    <section id="shopPane" class="panel">
      <div class="panel-inner">
        <h2 class="panel-title">Mejoras disponibles</h2>
        <div class="shop-list" id="shopGrid"></div>
      </div>
    </section>

    <!-- ÁRBOL -->
    <section id="treePane" class="panel tree-panel">
      <div class="tree-topbar">
        <span class="tree-topbar-title">✦ Árbol de Prestigio</span>
        <span class="tree-topbar-hint">arrastra · explora</span>
      </div>
      <div id="treeViewport" class="tree-vp">
        <div id="treeCanvas" class="tree-cv"></div>
      </div>
    </section>

    <!-- PRESTIGIO -->
    <section id="prestigePane" class="panel">
      <div class="panel-inner">

        <div class="prestige-stats">
          <div class="pstat">
            <span class="pstat-val" id="prestigePoints">0</span>
            <span class="pstat-lbl">💎 Fragmentos</span>
          </div>
          <div class="pstat-sep"></div>
          <div class="pstat">
            <span class="pstat-val accent-purple" id="prestigeBonus">1.00x</span>
            <span class="pstat-lbl">🚀 Bonus</span>
          </div>
          <div class="pstat-sep"></div>
          <div class="pstat">
            <span class="pstat-val accent-dim" id="prestigePreview">0</span>
            <span class="pstat-lbl">Ganancia</span>
          </div>
        </div>

        <p class="prestige-preview-text">
          Reiniciar otorgará <strong id="pGainText">0</strong> fragmentos 💎
        </p>

        <button class="prestige-btn" id="prestigeBtn">⟳ Reiniciar &amp; Ascender</button>

        <h3 class="p-shop-title">💎 Tienda de Fragmentos</h3>
        <div class="p-shop-grid" id="prestigeShop"></div>

      </div>
    </section>

  </main>
</div>

<div id="toast"></div>

<script>
// Animated star background
(function() {
  const c = document.getElementById('bg-canvas');
  const ctx = c.getContext('2d');
  let W, H, stars = [];

  function resize() {
    W = c.width  = window.innerWidth;
    H = c.height = window.innerHeight;
    stars = Array.from({length: 130}, () => ({
      x: Math.random() * W, y: Math.random() * H,
      r: Math.random() * 1.4 + 0.3,
      a: Math.random(), da: (Math.random() * 0.003 + 0.001) * (Math.random() > 0.5 ? 1 : -1)
    }));
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    // Nebula glow
    const g1 = ctx.createRadialGradient(W*0.2, H*0.1, 0, W*0.2, H*0.1, W*0.4);
    g1.addColorStop(0, 'rgba(150,80,255,0.1)'); g1.addColorStop(1, 'transparent');
    ctx.fillStyle = g1; ctx.fillRect(0,0,W,H);
    const g2 = ctx.createRadialGradient(W*0.8, H*0.85, 0, W*0.8, H*0.85, W*0.35);
    g2.addColorStop(0, 'rgba(0,180,255,0.08)'); g2.addColorStop(1, 'transparent');
    ctx.fillStyle = g2; ctx.fillRect(0,0,W,H);

    stars.forEach(s => {
      s.a += s.da;
      if (s.a > 1 || s.a < 0.05) s.da *= -1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(200,220,255,${s.a.toFixed(2)})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  resize();
  window.addEventListener('resize', resize);
  draw();
})();
</script>

<script type="module">
  import { checkAuth } from "/src/auth.js";
  import { initGame }  from "/src/game.js";

  const user = checkAuth();
  if (user) {
    initGame().catch(err => {
      console.error("initGame failed:", err);
      document.body.innerHTML = `
        <div style="color:#ff6b9d;font-family:monospace;padding:60px 20px;text-align:center;background:#05070f;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px">
          <div style="font-size:32px">⚠</div>
          <div style="font-size:18px;font-weight:bold">Error al cargar</div>
          <div style="font-size:12px;color:#666;max-width:300px">${err.message}</div>
          <button onclick="location.reload()" style="margin-top:8px;padding:12px 28px;background:transparent;border:1px solid #ff6b9d;color:#ff6b9d;cursor:pointer;border-radius:8px;font-family:monospace;font-size:13px">↺ Reintentar</button>
        </div>`;
    });
  }
</script>

</body>
</html>
