<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app">

        <!-- 🔝 HUD -->
        <header class="topbar">
          <div>⚡ <span id="energy">0</span></div>
          <div>⚙ <span id="eps">0</span>/s</div>
          <div>🌌 <span id="eraText"></span></div>
        </header>
    
        <!-- 🎮 BOTÓN PRINCIPAL (SIEMPRE VISIBLE) -->
        <div class="click-container">
          <button id="clickBtn" class="main-btn">⚡ GENERAR</button>
        </div>
    
        <!-- 🔘 TABS -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="shop">Tienda</button>
            <button class="tab-btn" data-tab="tree">Árbol</button>
            <button class="tab-btn" data-tab="prestige">Prestigio</button>
          </div>

    
        <!-- 📦 CONTENIDO -->
        <main class="content">
    
          <section id="shopTab" class="tab active">
            <div class="card">
              <h3>Tienda</h3>
              <div id="shop"></div>
            </div>
          </section>
    
          <section id="treeTab" class="tab">
            <div class="card">
              <h3>Árbol de Prestigio</h3>
              <div id="prestigeTree"></div>
            </div>
          </section>
    
        </main>

        <section id="prestigeTab" class="tab">
            <div class="card">
              <h3>Prestigio</h3>
          
              <p>💎 Fragmentos: <span id="prestigePoints">0</span></p>
              <p>🚀 Bonus: <span id="prestigeBonus">1x</span></p>
              <p>Ganancia potencial: <span id="prestigePreview">0</span></p>
          
              <button id="prestigeBtn" class="prestige-btn">
                Reiniciar progreso
              </button>
            </div>
          </section>
          
      </div>

    <script type="module">
        import { auth } from "/src/firebase.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { initGame } from "/src/game.js";

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "/login.html";
            } else {
                initGame();
            }
        });
    </script>

</body>

</html>
