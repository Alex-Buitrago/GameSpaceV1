<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app">

        <!-- 🧠 HUD SUPERIOR -->
        <header class="topbar">
          <div>
            ⚡ Energía: <span id="energy">0</span>
          </div>
          <div>
            ⚙ <span id="eps">0</span>/s
          </div>
          <div>
            🌌 <span id="eraText"></span>
          </div>
        </header>
    
        <!-- 🎮 CONTENIDO PRINCIPAL -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="shop">Tienda</button>
            <button class="tab-btn" data-tab="tree">Árbol</button>
          </div>
          
          <main class="content">
          
            <!-- TIENDA -->
            <section id="shopTab" class="tab active">
              <div class="card">
                <h3>Tienda</h3>
                <div id="shop"></div>
              </div>
            </section>
          
            <!-- ÁRBOL -->
            <section id="treeTab" class="tab">
              <div class="card">
                <h3>Árbol de Prestigio</h3>
                <div id="prestigeTree"></div>
              </div>
            </section>
          
          </main>
      </div>

    <script type="module">
        import { auth } from "/src/firebase.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { initGame } from "/src/game.js";

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "/login.html";
            } else {
                initGame();
            }
        });
    </script>

</body>

</html>
